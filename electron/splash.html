<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Title</title>

		<style>
			body {
				background: #1e1e1e; color: white;
				display: flex; align-items: center; justify-content: center;
				height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			}
			.container { text-align: center; }
			.loader {
				border: 4px solid #333; border-top: 4px solid #3498db;
				border-radius: 50%; width: 30px; height: 30px;
				animation: spin 1s linear infinite; margin: 20px auto;
			}
			@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
		</style>
	</head>
	<body>
		<div class="container">
			<h2 style="margin-bottom: 5px;">Financeless</h2>
			<p style="color: #888; font-size: 14px;">Warming up the engines...</p>
			<div class="loader"></div>
		</div>
	</body>
</html>
