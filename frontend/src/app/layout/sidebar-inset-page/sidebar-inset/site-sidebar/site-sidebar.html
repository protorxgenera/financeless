<div hlmSidebarWrapper>
    <hlm-sidebar variant="inset">

        <hlm-sidebar-header>
            <ul hlmSidebarMenu>
                <li hlmSidebarMenuItem>
                    <a hlmSidebarMenuButton size="lg" href="#">
                        <div
                            class="bg-sidebar-primary text-sidebar-primary-foreground flex aspect-square size-8 items-center justify-center rounded-lg"
                        >
                            <ng-icon name="lucideCommand" class="text-base"/>
                        </div>
                        <div class="grid flex-1 text-left text-sm leading-tight">
                            <span class="truncate font-medium">Financeless</span>
                            <span class="truncate text-xs">Your personal finance tracker</span>
                        </div>
                    </a>
                </li>
            </ul>
        </hlm-sidebar-header>

        <hlm-sidebar-content>

            <button hlmBtn routerLink="/">dashboard</button>
            <button hlmBtn routerLink="/transactions">transactions</button>
            <button hlmBtn routerLink="/analytics">analytics</button>
            <button hlmBtn routerLink="/settings">settings</button>
            <!--            <spartan-nav-main [items]="data.navMain" />-->
            <!--            <spartan-nav-projects [projects]="data.projects" />-->
            <!--            <spartan-nav-secondary class="mt-auto" [items]="data.navSecondary" />-->
        </hlm-sidebar-content>

        <hlm-sidebar-footer>
                        <nav-user [user]="data.user" />
        </hlm-sidebar-footer>

    </hlm-sidebar>

    <ng-content/>

</div>
