spring:
  application:
    name: backend
  datasource:
    url: jdbc:sqlite:data/financeless.db
    username: root
    password: root
    driver-class-name: org.sqlite.JDBC
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    enabled: true
    url: jdbc:sqlite:data/financeless.db
    baseline-on-migrate: true